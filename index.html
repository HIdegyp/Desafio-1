<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio-1</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/card.css" />
  
</head>

<body>
    <header>
        
    </header>
    <main>
        <section class="container-card">
            <div class="card card-result">
                <h2>Your Result</h2>
                <span class="score"><strong>76</strong><small>of 100</small></span>
                <span class="result-title">Great</span>
                <p>You scored higher than 65% of the people who have taken these tests.</p>
            </div>
        
            <div class="card card-summary">
                <h2>Summary</h2>
              <ul>
                <li class="item-reaction"> <img src="images/icon-reaction.svg" alt="Reaction">Reaction: <strong>80</strong> <small>/ 100</small></li>
                <li class="item-memory"> <img src="images/icon-memory.svg" alt="Memory">Memory: <strong>92</strong> <small>/ 100</small></li>
                <li class="item-verbal"> <img src="images/icon-verbal.svg" alt="Verbal">Verbal: <strong>61</strong> <small>/ 100</small></li>
                <li class="item-visual"> <img src="images/icon-visual.svg" alt="Visual">Visual: <strong>73</strong> <small>/ 100</small></li>
              </ul>
                <button type="button">Continue</button>
                </div>
        </section>
    </main>
</body>

</html>
